<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV API</title>
    <meta name="robots" content="noindex, nofollow">
</head>
<body>
    <script>
        // CORS headers for API-like behavior
        const corsHeaders = {
            'Access-Control-Allow-Origin': '*',
            'Access-Control-Allow-Methods': 'GET',
            'Access-Control-Allow-Headers': '*'
        };

        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const searchTerm = urlParams.get('searchTerm') || '';
        const format = urlParams.get('format') || 'csv';
        const callback = urlParams.get('callback'); // For JSONP support
        
        // Construct the CSV URL
        let targetUrl;
        if (searchTerm.trim().length > 0) {
            targetUrl = `https://georgeeliotarchive.org/items/browse?search=${encodeURIComponent(
                searchTerm
            )}&advanced%5B0%5D%5Bjoiner%5D=and&advanced%5B0%5D%5Belement_id%5D=&advanced%5B0%5D%5Btype%5D=&advanced%5B0%5D%5Bterms%5D=&range=&collection=&type=20&output=csv`;
        } else {
            targetUrl = `https://georgeeliotarchive.org/items/browse?search=&advanced%5B0%5D%5Bjoiner%5D=and&advanced%5B0%5D%5Belement_id%5D=&advanced%5B0%5D%5Btype%5D=&advanced%5B0%5D%5Bterms%5D=&range=&collection=17&type=20&tags=&public=&featured=&submit_search=Search+for+items&output=csv`;
        }
        
        // Function to display result
        function displayResult(data, isError = false) {
            // Remove any loading indicators
            document.body.innerHTML = '';
            
            if (callback) {
                // JSONP response
                const jsonpData = isError ? 
                    { success: false, error: data } : 
                    { success: true, data: data };
                document.body.textContent = `${callback}(${JSON.stringify(jsonpData)});`;
                document.body.style.whiteSpace = 'pre';
            } else if (format === 'json') {
                // JSON response
                const jsonData = isError ? 
                    { success: false, error: data, searchTerm: searchTerm } : 
                    { success: true, data: data, searchTerm: searchTerm };
                document.body.textContent = JSON.stringify(jsonData, null, 2);
                document.body.style.whiteSpace = 'pre';
            } else {
                // Raw CSV response
                if (isError) {
                    document.body.textContent = `Error: ${data}`;
                } else {
                    document.body.textContent = data;
                    document.body.style.whiteSpace = 'pre';
                    document.body.style.fontFamily = 'monospace';
                }
            }
        }
        
        // Show loading message
        document.body.textContent = 'Loading...';
        
        // Fetch the CSV data
        fetch(targetUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(csvData => {
                displayResult(csvData);
            })
            .catch(error => {
                displayResult(error.message, true);
            });
    </script>
</body>
</html>

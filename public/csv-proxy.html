<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Proxy</title>
</head>
<body>
    <script>
        // Get search term from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const searchTerm = urlParams.get('searchTerm') || '';
        const format = urlParams.get('format') || 'csv';
        
        // Construct the CSV URL
        let targetUrl;
        if (searchTerm.trim().length > 0) {
            targetUrl = `https://georgeeliotarchive.org/items/browse?search=${encodeURIComponent(
                searchTerm
            )}&advanced%5B0%5D%5Bjoiner%5D=and&advanced%5B0%5D%5Belement_id%5D=&advanced%5B0%5D%5Btype%5D=&advanced%5B0%5D%5Bterms%5D=&range=&collection=&type=20&output=csv`;
        } else {
            targetUrl = `https://georgeeliotarchive.org/items/browse?search=&advanced%5B0%5D%5Bjoiner%5D=and&advanced%5B0%5D%5Belement_id%5D=&advanced%5B0%5D%5Btype%5D=&advanced%5B0%5D%5Bterms%5D=&range=&collection=17&type=20&tags=&public=&featured=&submit_search=Search+for+items&output=csv`;
        }
        
        // Fetch the CSV data
        fetch(targetUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(csvData => {
                if (format === 'json') {
                    // Return as JSON for programmatic access
                    const result = {
                        success: true,
                        data: csvData,
                        searchTerm: searchTerm
                    };
                    document.body.textContent = JSON.stringify(result);
                    document.body.style.whiteSpace = 'pre';
                } else {
                    // Return raw CSV
                    document.body.textContent = csvData;
                    document.body.style.whiteSpace = 'pre';
                }
            })
            .catch(error => {
                const errorResult = {
                    success: false,
                    error: error.message,
                    searchTerm: searchTerm
                };
                document.body.textContent = JSON.stringify(errorResult);
            });
    </script>
</body>
</html>
